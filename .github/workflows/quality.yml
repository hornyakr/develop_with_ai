name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Require committed lockfile
        run: test -f pnpm-lock.yaml || (echo "Generate, review, and commit pnpm-lock.yaml before enabling CI." && exit 1)
      - run: pnpm install --frozen-lockfile
      - run: pnpm agents:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm evals
